name: Build

env:
  CARGO_TERM_COLOR: always

on:
  push:
    paths:
      - .github/workflows/**.ya?ml
      - src/**
      - xtask/**
      - "**/*.lock"
      - "**/*.toml"
  workflow_dispatch:

jobs:
  build:
    runs-on: "${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            targets: ["x86_64-apple-darwin", "aarch64-apple-darwin"]
          - name: Linux
            os: ubuntu-latest
            targets: ["x86_64-unknown-linux-gnu"]
          - name: Windows
            os: windows-latest
            targets: ["x86_64-pc-windows-msvc"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5.0.1

      - name: Set outputs
        id: set-outputs
        shell: bash
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2.7.3
        with:
          prefix-key: ${{ runner.os }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libgl-dev libjack-dev libx11-xcb-dev  libxcb1-dev libxcb-dri2-0-dev libxcb-icccm4-dev libxcursor-dev libxkbcommon-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          for target in $(jq -r '.[]' <<< '${{ toJSON(matrix.targets) }}'); do
            rustup target add $target
          done

      - name: Build
        shell: bash
        run: |
          for target in $(jq -r '.[]' <<< '${{ toJSON(matrix.targets) }}'); do
            workspace=$(echo "${{ github.workspace }}" | tr '\\' '/')
            mkdir -p $workspace/target/bundled/$target
            cargo xtask bundle haashimself --release --target="$target"
            mv $workspace/target/bundled/HaasHimself* $workspace/target/bundled/$target
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.3.3
        with:
          name: ${{ github.event.repository.name  }}-${{ steps.set-outputs.outputs.SHORT_SHA }}-${{ matrix.name }}
          path: ${{ github.workspace }}/target/bundled/
